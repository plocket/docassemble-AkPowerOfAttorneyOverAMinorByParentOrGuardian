id: Alaska_power_of_attorney_over_a_minor_by_parent_or_guardian
continue button field: ak_power_of_attorney_over_a_minor_by_parent_or_guardian_intro
question: |
  Alaska power of attorney over a minor by parent or guardian
subquestion: |
  This form helps a parent or guardian in Alaska let a family member or other person temporarily make important decisions for their children by making a document called "Alaska power of attorney over a minor by parent or guardian".

  For example, if you are a parent and need to leave the United States, the person you choose can make decisions about your children's medical situations, schools, and other situations.

  You do not need to go to court to use this form, so it may be a good alternative to a guardianship or custody case.

  Leaving children with a non-parent for a long time can affect parental rights, so think about getting legal advice.

  :clock: Most people take about 15 minutes to finish this form.[BR]
  :lock: This tool will **not** save your information. If you close this page you may have to start this form all over again.
  
  **Before you start**:

  1. Make sure you can print 2 copies of the final document.
  1. Decide how long you want the decision-maker to have permission to make the decisions. Unless you are in the US military it must be a year or less.
  1. Find someone who has the power to take oaths or [a notary](https://courtformsonline.org/guides/finding-and-using-a-notary) certified in Alaska. Many times, someone can become a notary fairly easily. The notary must see you and the decision-maker sign the document and then they must stamp the document.
  1. You will have to fill out some more of this form by hand when you meet with the notary.
  1. Choose the person who will make decisions for your children. The person must be 18 years old or older.
  1. Get that person's current address.
  
  When you are finished, you will need to:
  
  1. Sign both documents in front of the [notary](https://courtformsonline.org/guides/finding-and-using-a-notary).
  1. Keep one signed copy for your records.
  1. Give the decision-maker a signed copy of the document.

  You may also want to:

  1. Add the decision-maker as an emergency contact with the children's school, doctor, and childcare provider.
  1. Give the decision maker important documents your children have, like birth certificates, insurance cards, and school or medical records.
  
  This authorization does not allow the new decision-maker to make decisions about abortion, your rights as a parent, or about the marriage or adoption of your children.
  
  You can cancel the agreement in writing at any time.
---
id: notary
continue button field: notary
question: |
  Notary
subquestion: |
  You must **wait** to date and sign your document until you are in front of someone who has the power to take oaths, like [a notary public](https://courtformsonline.org/guides/finding-and-using-a-notary).
  
  * A court clerk can do this for free.
  * Bring a valid photo ID with you.
  * If you cannot get to a notary or someone else with the power to take oaths, you can "self-certify." Use **Self-Certification (No Notary Available), TF-835**. You can [fill in the Self-Certification PDF here](https://public.courts.alaska.gov/web/forms/docs/tf-835.pdf).

  These questions are to help you make a plan. We will add these answers to your reminder document. You can skip any of these questions if you want.
fields:
  - "Will you use a notary or someone with the power to take oaths, or will you print and fill out the [Self-Certification TF-835 PDF here](https://public.courts.alaska.gov/web/forms/docs/tf-835.pdf) instead?": users[0].needs_TF_835
    required: False
    datatype: radio
    choices:
      - I will use a notary public or someone with the power to take oaths: False
      - I will use the Self-Certification form: True
  - note: |
      You can [read about how to find a notary here](https://courtformsonline.org/guides/finding-and-using-a-notary).
    show if:
      variable: users[0].needs_TF_835
      is: False
---
# Own page to make sure to ask for new val if notary val changes
id: own certification next steps
depends on:
  - users[0].needs_TF_835
question: |
  Next steps for certification
subquestion: |
  % if users[0].needs_TF_835:
  You plan to certify your documents with someone with the power to take oaths, like a notary.
  % else:
  You plan to certify your documents with the Self-Certification (No Notary Available) TF-835 form.
  % endif
  You can make a note here about what your next steps will be and we will put it on your reminder document. You can skip this.
fields:
  - What will your next steps be to prepare to certify your documents?: users[0].certification_next_steps
    required: False
---
id: user ID
if: not users[0].needs_TF_835
question: |
  Your ID
subquestion: |
  When you see a notary, bring a valid photo ID with you. Valid photo IDs include:

  * A US drivers license
  * A US passport
  
  These questions are to help you make a plan. We will add these answers to your reminder document. You can skip any of these questions if you want.
fields:
  - Do you have a valid photo ID with you now?: users[0].has_valid_id
    datatype: yesnomaybe
    required: False
  # Do we need both of the following questions?
  - Can you get or find a valid photo ID?: users[0].can_get_valid_id
    datatype: yesnomaybe
    required: False
    js show if: |
      val('users[0].has_valid_id') == "None" || val('users[0].has_valid_id') == false
  - "So we can remind you later, what will be your next steps for getting a valid ID?": users[0].valid_id_next_steps
    required: False
    js show if: |
      val('users[0].has_valid_id') == "None" || val('users[0].has_valid_id') == false
  - "Do you need to print and fill out the [Self-Certification TF-835 PDF here](https://public.courts.alaska.gov/web/forms/docs/tf-835.pdf) instead?": users[0].needs_TF_835
    datatype: radio
    choices:
      - I will still use a notary public or someone with the power to take oaths: False
      - I will use the Self-Certification form: True
    required: False
---
id: names of people
sets:
  - caregivers[0].name.first
  - caregivers[0].name.last
  - caregivers[0].name.middle
  - caregivers[0].name.suffix
generic object: ALPeopleList
question: |
  Who do you want to make decisions for your children?
subquestion: |
  This person is called the "attorney-in-fact" on the final document.
  
  You will give this person permission to make decisions for your children. This person must be 18 years old or older.
fields:
  - code: |
      caregivers[0].name_fields()
---
# This is sort of a trick question, but people check checkboxes automatically. Still, trick questions are jarring
id: Caregiver age
question: |
  ${ caregivers[0].name.full() }'s age
subquestion: |
  The person making decisions for your children must be at least 18 years old.
fields:
  - "Is ${ caregivers[0].name.full() } 18 years old or older": caregivers[0].is_major
    datatype: yesnoradio
validation code: |
  if not caregivers[0].is_major:
    validation_error("The person who makes decisions for your children must be 18 years old or older. You need to go back and choose someone else.", field="caregivers[0].is_major")
---
id: id
if: not users[0].needs_TF_835
generic object: Individual
question: |
  ${ x.name.full() }'s ID
subquestion: |
  ${ x } should also bring a valid photo ID. Valid photo IDs include:

  * A US drivers license
  * A US passport
  
  These questions are to help you make a plan. We will add these answers to your reminder document. You can skip any of these questions if you want.
fields:
  - Does ${ x } have a valid photo ID with them now?: x.has_valid_id
    datatype: yesnomaybe
    required: False
  - Can ${ x } get or find a valid photo ID?: x.can_get_valid_id
    datatype: yesnomaybe
    required: False
    js show if: |
      val('x.has_valid_id') == "None" || val('x.has_valid_id') == false
  - "So we can remind you later, what will be your next steps for making sure ${ x } brings a valid photo ID?": x.valid_id_next_steps
    required: False
    js show if: |
      val('x.has_valid_id') == "None" || val('x.has_valid_id') == false
  - "Do you need to print and fill out the [Self-Certification TF-835 PDF here](https://public.courts.alaska.gov/web/forms/docs/tf-835.pdf) instead?": users[0].needs_TF_835
    datatype: radio
    choices:
      - I will still use a notary public or someone with the power to take oaths: False
      # Disable/hide others here?
      - I will use the Self-Certification form instead: True
    required: False
---
# id: num children
# question: |
#   The children
# subquestion: |
#   These must be children that you are either a parent of or a guardian of.
