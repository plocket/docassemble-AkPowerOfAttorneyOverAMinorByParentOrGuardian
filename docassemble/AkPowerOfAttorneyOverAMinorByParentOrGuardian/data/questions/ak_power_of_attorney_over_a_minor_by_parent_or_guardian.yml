---
id: children completion
code: |
  parental_delegation_children[i].name.first
  parental_delegation_children[i].birthdate
  parental_delegation_children[i].complete = True
---
id: children
sets:
  - parental_delegation_children[i].name.first
  - parental_delegation_children[i].name.last
  - parental_delegation_children[i].name.middle
  - parental_delegation_children[i].name.suffix
question: |
  % if i == 0:
  Information about the child you want ${ caregivers[0].name.full() } to make decisions for
  % else:
  Information about the ${ ordinal(i) } child you want ${ caregivers[0].name.full() } to make decisions for
  % endif
subquestion: |
  % if i > 0:
  You have already told us about **${ comma_and_list( parental_delegation_children.complete_elements() ) }**.
  % endif
fields:
  - code: |
      parental_delegation_children[i].name_fields()
  - Are you a parent or guardian of this child?: parental_delegation_children[i].user_is_parentish
    datatype: yesnoradio
  - The child's date of birth: parental_delegation_children[i].birthdate
    datatype: BirthDate
    alMin: ${ as_datetime( today().minus( years=18 ).plus( days=1 )) }
    alMinMessage: 'To put a child on this form, the child must be less than 18 years old. This child is 18 years old or older.'
validation code: |
  if not parental_delegation_children[i].user_is_parentish:
    validation_error('If you are not the parent or guardian of the child you cannot put the child on this form.', field='parental_delegation_children[i].user_is_parentish')
---
id: there is another child
question: |
  Do you want to add another child to the document?
subquestion: |
  This child must be younger than 18 years old. You must be the child's parent or guardian.
yesno: parental_delegation_children.there_is_another
---
id: mandates
question: |
  What decisions do you want ${ caregivers[0].name.full() } to make for ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }?
subquestion: |
  You can choose what decisions [more]. There are some decisions ${ caregivers[0].name.full() } CANNOT make for ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }. They are these ones:
  
  - They cannot make decisions about marriage or adoption.
  - They cannot make decisions about abortion.
  - They cannot take away your rights as a parent of ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }.
  
  You have the right to cancel these permissions at any time.
fields:
  - "Which of these do you want ${ caregivers[0].name.full() } to decide for ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }?": parental_delegation_mandates
    datatype: checkboxes
    none of the above: False
    choices:
      code: |
        parental_delegation_mandates_map
  - "What other decisions do you want ${ caregivers[0].name.full() } to make for ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }?": custom_mandates
    input type: area
    show if: parental_delegation_mandates['other']
---
# ==========
# WARNING: If you change the number of items in parental_delegation_mandates_map you also may need to change the docx check for which mandates paragraph to show.
# ==========
id: madates values
variable name: parental_delegation_mandates_map
data: !!omap
  - education_enroll: "Enroll ${ comma_and_list( parental_delegation_children ) } in school."
  - education_records: "See and get copies of school records and other records."
  - education_activities: "Let ${ comma_and_list( parental_delegation_children ) } go to school activities and other functions."
  - general: "Choose to give or withhold any consent or waiver for school activities, medical treatment, dental treatment, and other activity, function, or treatment that may concern ${ comma_and_list( parental_delegation_children, and_string='or') }."
  - other: "Other decisions"
---
id: Your military status
question: |
  Your military status
fields:
  - "Are you in the US military?": users[0].is_in_US_military
    datatype: yesnoradio
---
id: add children
event: add_children
question: |
  Your children
review:
  - Edit: parental_delegation_children.revisit
    button: |
      ${ revisit_delegation_children }
---
id: ak power of attorney over a minor by parent or guardian review screen
event: review_ak_power_of_attorney_over_a_minor_by_parent_or_guardian
question: |
  Review your answers
review:
  - Edit: users.revisit
    button: |
      ### Your information

      **Name**: ${ users[0].name.full() }[BR]
      **Address**:[BR]
      ${ users[0].address.block() }[BR]
      **Contact information**:[BR]
      ${ showifdef( 'users[0].mobile_number' ) or showifdef( 'user[0].phone_number' ) or 'None' }
  - Edit: users[0].is_in_US_military
    button: |
      **Military status**:
      % if users[0].is_in_US_military:
      You are a member of the US military
      % else:
      You are **not** in the US military
      % endif
  - Edit: caregivers[0].name.first
    button: |
      ### Decision-maker

      **Name**: ${ caregivers[0].name.full() }[BR]
      **Age**: 18 years old or older[BR]
      **Address**:[BR]
      ${ caregivers[0].address.block() }[BR]
      **Contact information**:[BR]
      ${ showifdef( 'caregivers[0].mobile_number' ) or showifdef( 'caregivers[0].phone_number' ) or 'None' }
  - Edit: parental_delegation_children.revisit
    button: |
      **${ caregivers[0].name.full() } can make decisions for these children**

      % for child in parental_delegation_children:
      * ${ child.name.full() }, born ${ child.birthdate }
      % endfor
  - Edit: parental_delegation_mandates
    button: |
      **You want ${ caregivers[0].name.full() } to decide these for ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }?**:
      % for mandate in parental_delegation_mandates.true_values:
      * ${ mandate }
      % endfor
      % if parental_delegation_mandates['other']:
      * ${ custom_mandates }
      % endif
---
continue button field: parental_delegation_children.revisit
question: |
  Your children
subquestion: |
  ${ revisit_delegation_children }
---
template: revisit_delegation_children
content: |
  Add the children that you want ${ caregivers[0].name.full() } to make decisions for. You must be their parent or guardian.
  
  ${ parental_delegation_children.table }
  
  ${ parental_delegation_children.add_action(label="Add a child") }
---
table: parental_delegation_children.table
rows: parental_delegation_children
columns:
  - Name: |
      row_item.name_full() if defined("row_item.name.first") else ""
  - Birthdate: |
      row_item.birthdate if defined("row_item.birthdate") else ""
edit:
  - name.first
  - birthdate
confirm: True
---
id: download ak_power_of_attorney_over_a_minor_by_parent_or_guardian
event: ak_power_of_attorney_over_a_minor_by_parent_or_guardian_download
question: |
  All done! :face-smile:
subquestion: |
  Thank you, ${ comma_and_list( users ) }. Your document is ready to download at the bottom of the page. Here is what you need to do next.

  **Before you print the form:**
  
  1. :eye: [Look at the document at the bottom of the page](#documents) to make sure it is correct.
  1. :pencil: Tap the "Edit answers" button to fix any mistakes.

  **Next steps:**
  
  1. :print: :print: Print 2 copies of the document.
  1. :user-tie: Go to the [notary certified by Alaska](https://courtformsonline.org/guides/finding-and-using-a-notary).
  1. :pen: Write the dates when you want ${ caregivers[0].name.full() } to start making decisions and when you want them to stop. ${ "That time period can be up to 1 year or, if you need, it can be up to 30 days after your military duty ends" if users[0].is_in_US_military else "You can give them permission for up to a year" }.
  1. :eye: Make sure you have filled out all the blank lines in the form.
  1. :signature: You and ${ caregivers[0].name.full() } should both sign both documents in front of the Alaska notary.
  1. :signature: Have the notary notarize and sign both documents.
  1. :file-lines: Give one signed document to ${ caregivers[0].name.full() }.
  1. :folder: Keep the other document for your records.

  After that, ${ caregivers[0].name.full() } can show this document to prove they have permission to make decisions for ${ comma_and_list( parental_delegation_children ) }.

  You may also want to:
  
  :phone: Add ${ caregivers[0].name.full() } as an emergency contact with the schools, doctors, and childcare provider.[BR]
  :file-lines: Give ${ caregivers[0].name.full() } important documents, like birth certificates, insurance cards, and school or medical records.

  ---

