metadata:
  title: >-
    Alaska power of attorney over a minor by parent or guardian
  short title: >-
    AK power of attorney
  description: |-
    This form helps a parent or guardian in Alaska let a family member or other person temporarily make important decisions for their children by making a document called "Alaska power of attorney over a minor by parent or guardian".
  
    For example, if you are a parent and need to leave the United States for a while, the person you choose can make decisions about your children's medical situations, schools, and other situations.
  
    You do not need to go to court to use this form, so it may be a good alternative to a guardianship or custody case.
  
    Leaving children with a non-parent for a long time can affect parental rights, so think about getting legal advice.
  can_I_use_this_form: |
    You might use this form if you are a parent in Alaska who needs someone else to make decisions for your children while you are away from home. For example, you might be leaving the US for a while.
  before_you_start: |
    **Before you start**:
    
    1. Make sure you can print 2 copies of the final document.
    1. Decide how long you want the decision-maker to have permission to make the decisions. Unless you are in the US military it must be a year or less.
    1. [Find a notary](https://courtformsonline.org/guides/finding-and-using-a-notary). Many times, someone can become a notary fairly easily. The notary must see you and the decision-maker sign the document and then they must stamp the document.
    1. You will have to fill out some more of this form by hand when you meet with the notary.
    1. Choose the person who will make decisions for your children. The person must be 18 years old or older.
    1. Get that person's current address.
    
    When you are finished, you will need to:
    
    1. Sign both documents in front of the [notary](https://courtformsonline.org/guides/finding-and-using-a-notary).
    1. Keep one signed copy for your records.
    1. Give the decision-maker a signed copy of the document.

    You may also want to:

    1. Add the decision-maker as an emergency contact with the children's school, doctor, and childcare provider.
    1. Give the decision maker important documents your children have, like birth certificates, insurance cards, and school or medical records.
    
    This authorization does not allow the new decision-maker to make decisions about abortion, your rights as a parent, or about the marriage or adoption of your children.
    
    You can cancel the agreement in writing at any time.
    
    You may also want to add the decision-maker as an emergency contact with the children's school, doctor, and childcare provider.
