---
id: children completion
code: |
  parental_delegation_children[i].name.first
  parental_delegation_children[i].birthdate
  parental_delegation_children[i].complete = True
---
id: children
sets:
  - parental_delegation_children[i].name.first
  - parental_delegation_children[i].name.last
  - parental_delegation_children[i].name.middle
  - parental_delegation_children[i].name.suffix
question: |
  % if i == 0:
  Information about the child you want ${ caregivers[0].name.full() } to make decisions for
  % else:
  Information about the ${ ordinal(i) } child you want ${ caregivers[0].name.full() } to make decisions for
  % endif
subquestion: |
  % if i > 0:
  You have already told us about **${ comma_and_list( parental_delegation_children.complete_elements() ) }**.
  % endif
fields:
  - code: |
      parental_delegation_children[i].name_fields()
  - Are you a parent or guardian of this child?: parental_delegation_children[i].user_is_parentish
    datatype: yesnoradio
  - The child's date of birth: parental_delegation_children[i].birthdate
    datatype: BirthDate
    alMin: ${ as_datetime( today().minus( years=18 ).plus( days=1 )) }
    alMinMessage: 'To put a child on this form, the child must be less than 18 years old. This child is 18 years old or older.'
validation code: |
  if not parental_delegation_children[i].user_is_parentish:
    validation_error('If you are not the parent or guardian of the child you cannot put the child on this form.', field='parental_delegation_children[i].user_is_parentish')
---
id: there is another child
question: |
  Do you want to add another child to the document?
subquestion: |
  This child must be younger than 18 years old. You must be the child's parent or guardian.
yesno: parental_delegation_children.there_is_another
---
id: mandates
question: |
  What decisions do you want ${ caregivers[0].name.full() } to make for ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }?
subquestion: |
  You can choose what decisions [more]. There are some decisions ${ caregivers[0].name.full() } CANNOT make for ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }. They are these ones:
  
  - They cannot make decisions about marriage or adoption.
  - They cannot make decisions about abortion.
  - They cannot take away your rights as a parent of ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }.
  
  You have the right to cancel these permissions at any time.
fields:
  - "Which of these do you want ${ caregivers[0].name.full() } to decide for ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }?": parental_delegation_mandates
    datatype: checkboxes
    none of the above: False
    choices:
      code: |
        parental_delegation_mandates_map
  - "What other decisions do you want ${ caregivers[0].name.full() } to make for ${ 'your children' if parental_delegation_children.number_gathered() > 1 else parental_delegation_children[0].name.first }?": custom_mandates
    input type: area
    show if: parental_delegation_mandates['other']
---
# ==========
# WARNING: If you change the number of items in parental_delegation_mandates_map you also may need to change the docx check for which mandates paragraph to show.
# ==========
id: madates values
variable name: parental_delegation_mandates_map
data: !!omap
  - education_enroll: "Enroll ${ comma_and_list( parental_delegation_children ) } in school."
  - education_records: "See and get copies of school records and other records."
  - education_activities: "Let ${ comma_and_list( parental_delegation_children ) } go to school activities and other functions."
  - general: "Choose to give or withhold any consent or waiver for school activities, medical treatment, dental treatment, and other activity, function, or treatment that may concern ${ comma_and_list( parental_delegation_children, and_string='or') }."
  - other: "Other decisions"
---
id: Your military status
question: |
  Your military status
fields:
  - "Are you in the US military?": users[0].is_in_US_military
    datatype: yesnoradio
---
id: parental delegation dates
continue button field: parental_delegation_dates
check in: calc_max_delegation_expiry
question: |
  Start and end dates
subquestion: |
  When you see the notary you will have to use a pen to write the start and end dates for ${ caregivers[0].name.full() }'s permission to make decisions. If you answer these questions we will make a document for you that will remind you about those dates. You can skip this question and decide later.

  There are rules about how long ${ caregivers[0].name.full() } can make decisions for ${ comma_and_list( parental_delegation_children ) }. ${ f"You are in the US military so { caregivers[0].name.full() } can have permission for either up to 1 year, or until 30 days after the end date on your deployment orders." if users[0].is_in_US_military else f"{ caregivers[0].name.full() } can have permission for up to 1 year." }
fields:
  - "Do you want to pick dates now or later?": decide_delegation_dates_later
    required: False
    default: False
    datatype: radio
    choices:
      - Now: False
      - Later: True
  - "When do you want ${ caregivers[0].name.full() } to start making decisions?": delegation_start_date
    required: False
    datatype: ThreePartsDate
    alMin: ${ today().format('MM/dd/yyyy') }
    hide if: decide_delegation_dates_later
  
  # Military. There will always be an end date on their
  # deployment order
  - note: |
      The latest end date you can pick depends on the end date written on your deployment order.
    hide if: decide_delegation_dates_later
    show if:
      code: users[0].is_in_US_military
  - Do you have your deployment order to look at?: users[0].has_deployment_order
    required: False
    datatype: yesnoradio
    hide if: decide_delegation_dates_later
    show if:
      code: users[0].is_in_US_military
  - When is the end date on your deployment order?: users[0].deployment_end
    required: False
    show if: users[0].has_deployment_order
    datatype: ThreePartsDate
    alMin: ${ today().format('MM/dd/yyyy') }
    
  - note: |
      [TARGET delegation_expiry_help]
    hide if: decide_delegation_dates_later
  - "When do you want ${ caregivers[0].name.full() } to stop making decisions?": delegation_end_date
    # Never require even if "start" is answered. We will use what they give us.
    required: False
    datatype: ThreePartsDate
    alMin: ${ today().format('MM/dd/yyyy') }
    hide if: decide_delegation_dates_later
css: |
  <style>
    .datargetdelegation_expiry_help,
    .delegation_end_date_help {
      display: inline-block;
      height: fit-content;
      max-height: fit-content;
      margin-bottom: 0;
    }
  </style>
---
id: delegation expiry limits
event: calc_max_delegation_expiry
# `sets:` not required, but avoids confusing red text in editor
sets:
  - delegation_duration_rule
  - is_over_max_delegation_date
  - live_delegation_end
  - live_delegation_start
  - live_deployment_end
  - max_delegation_expiry
comment: |
  Language and flow possibilities:
  Previous page: "Do you want help figuring out your start and end dates for the delegation?"
  "Here is what your reminder will look like:"
code: |
  # How to show something different when the server is reloading but the user is seeing the same message? Need to detect checkin call or "change" event while on the page.
  
  import re

  def as_date_or_None( some_str ):
    """
    Return a valid date input string as a date, otherwise None
    Args:
      some_str (str) A string that may or may not be a valid date
    Returns:
      (DADateTime or None)
    """
    if not some_str:
      # Allow for input of None or empty string
      return None
    else:
      # If error, fail silently. Default messages are enough.
      try:
        if re.fullmatch(r'\d\d?/\d\d?/\d\d\d\d', some_str ):
          input_date = as_datetime( some_str )
          if str( input_date ) != 'Bad date':
            return input_date
      except Exception as err:
        return None
    return None
  

  # === Get input values ===

  live_delegation_start = as_date_or_None( action_argument('delegation_start_date') )
  live_delegation_end = as_date_or_None( action_argument('delegation_end_date') )
  live_deployment_end = as_date_or_None( action_argument('users[0].deployment_end') )
  
  live_has_deployment_order = action_argument('users[0].has_deployment_order')

  # Defaults
  delegation_duration_rule = "a year after the start date"
  if users[0].is_in_US_military:
    delegation_duration_rule = f'{ delegation_duration_rule } or 30 days after the end date on your deployment orders'

  # Actual end date maximum vals if possible
  max_delegation_expiry = None
  if live_delegation_start != None:
    year_after_start = live_delegation_start.plus( years=1 )

    if not users[0].is_in_US_military:
      max_delegation_expiry = year_after_start
  
    else:
      try:
        if live_deployment_end.plus( days=30 ) >= year_after_start:
          max_delegation_expiry = live_deployment_end.plus( days=30 )
        else:
          max_delegation_expiry = year_after_start
      except:
        pass

  is_over_max_delegation_date = False
  try:
    if live_delegation_end > max_delegation_expiry:
      is_over_max_delegation_date = True
  except:
    pass

  max_delegation_expiry_msg
---
comment: |
  We need another field to make the user click off of the end date so they can see their validation message.

  `check in:` should have a `check in event:`
target: delegation_expiry_help
template: max_delegation_expiry_msg
content: |
  % if live_delegation_end and max_delegation_expiry and is_over_max_delegation_date:
  <div class="delegation_end_date_help h-auto alert alert-warning" markdown=1>
  <i class="fa-solid fa-face-frown"></i> **WARNING**: You must pick an end date **on or before** ${ delegation_duration_rule }.
  % else:
  <div class="delegation_end_date_help h-auto alert alert-info" markdown=1>
  If you pick and end date, you must pick a date **on or before** ${ delegation_duration_rule }.
  % endif
  
  % if live_delegation_start and (not users[0].is_in_US_military or (users[0].is_in_US_military and live_deployment_end)):
  This permission will **start** on ${ live_delegation_start }, so you must **pick an end date on or before** ${ max_delegation_expiry }. You can also leave it blank.
  % endif
  
  </div>
---
